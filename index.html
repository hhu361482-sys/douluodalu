<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>斗罗大陆文字版 RPG</title>
<meta name="theme-color" content="#fbfbf8" />
<style>
:root{
  --bg:#fbfbf8;--paper:#fffffc;--ink:#111;--muted:#666;--line:#111;--thin:#b8b8b0;--soft:#efefea;
  --max:820px;--shadow:none;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{min-height:100%}
body{
  margin:0;color:var(--ink);background:var(--bg);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Noto Sans CJK SC","Microsoft YaHei",Arial,sans-serif;
  line-height:1.9;letter-spacing:.01em;
}
body:before{
  content:"";position:fixed;inset:0;pointer-events:none;opacity:.22;
  background:linear-gradient(90deg,rgba(17,17,17,.035) 1px,transparent 1px),linear-gradient(rgba(17,17,17,.025) 1px,transparent 1px);
  background-size:28px 28px;
}
button,input{font:inherit}
button{
  border:1.5px solid var(--line);border-radius:0;padding:13px 16px;background:#fff;color:var(--ink);
  font-weight:800;box-shadow:none;letter-spacing:.03em;min-height:48px;
}
button:active{transform:translateY(1px);background:#f3f3ee}
button.primary{background:#111;color:#fff;border-color:#111}
button.ghost{background:#fff;color:#111}
input{width:100%;border:1.5px solid var(--line);background:#fff;color:var(--ink);padding:14px;border-radius:0;outline:0;min-height:48px}
.home{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:18px}
.hero{
  width:min(var(--max),100%);padding:34px 26px;border:2px solid var(--line);background:var(--paper);box-shadow:none;position:relative;
}
.hero:before,.hero:after{content:"";position:absolute;left:14px;right:14px;height:1px;background:#111}.hero:before{top:14px}.hero:after{bottom:14px}
.logo{font-size:34px;font-weight:950;letter-spacing:.12em;margin:0 0 8px;color:#111;line-height:1.25}.sub{color:var(--muted);font-size:14px;margin-bottom:20px}
.app{max-width:var(--max);margin:0 auto;padding:12px 12px 92px;position:relative}
.card{background:var(--paper);border:1.7px solid var(--line);border-radius:0;padding:20px;box-shadow:none;margin:12px 0;position:relative}
.card:has(.chapterTitle){padding-top:22px}
.topbar{position:sticky;top:0;z-index:5;padding:10px 0 4px;background:linear-gradient(180deg,var(--bg) 78%,rgba(251,251,248,0))}
.status{display:flex;gap:12px;justify-content:space-between;align-items:center;background:var(--paper);border:1.7px solid var(--line);padding:12px}
.name{font-weight:950;color:#111;letter-spacing:.04em}.meta,.small{font-size:13px;color:var(--muted)}
.bars{display:flex;gap:7px;margin-top:8px}.bar{height:8px;width:112px;background:#fff;border:1.2px solid var(--line);border-radius:0;overflow:hidden}.bar i{display:block;height:100%;background:#111}.bar.sp i{background:#555}
.chapterTitle{font-size:25px;font-weight:950;color:#111;line-height:1.42;letter-spacing:.03em}.chapterTitle small{display:block;color:var(--muted);font-size:13px;font-weight:700;margin-top:4px;letter-spacing:.04em}
.chapterMeta,.row,.readerLine{display:flex;gap:8px;flex-wrap:wrap;align-items:center}.mini,.tag{display:inline-block;padding:3px 8px;border-radius:0;background:#fff;border:1px solid #111;color:#111;font-size:12px;line-height:1.5}
.progressLine{height:8px;background:#fff;border:1px solid var(--line);border-radius:0;overflow:hidden;margin:14px 0}.progressLine i{height:100%;display:block;background:#111}
.goal{padding:11px 12px;border:1.5px solid var(--line);background:#fafaf6;color:#111;font-size:14px;margin:10px 0}.goal:before{content:"当前目标｜";font-weight:900}
.sceneTitle{font-weight:950;color:#111;letter-spacing:.12em;margin:14px 0 10px;border-bottom:1px solid #111;padding-bottom:6px}
.epigraph{border-left:4px solid var(--line);padding:12px 14px;background:#fafaf6;color:#111;font-family:"Songti SC","Noto Serif CJK SC",Georgia,"Times New Roman",serif;font-size:18px;line-height:1.9}
.novel{padding:4px 0}.novel p{margin:14px 0;font-size:16.5px;text-align:justify;font-family:"Songti SC","Noto Serif CJK SC","PingFang SC",serif;line-height:2.05}.novel p.key{font-size:17.2px;color:#111;font-weight:800}.novel p.whisper{color:#555;font-family:"Songti SC","Noto Serif CJK SC",Georgia,"Times New Roman",serif}.novel .mark{color:#111;font-weight:900;text-decoration:underline;text-underline-offset:3px;text-decoration-thickness:1px}
.dialogue{margin-top:14px;padding:13px 14px;border:1.5px solid var(--line);background:#fff}.dialogue b{color:#111}.dialogue:before{content:"对白";display:block;font-size:12px;font-weight:900;letter-spacing:.16em;margin-bottom:4px;color:#555}
.aside{margin-top:12px;padding:12px 13px;border:1px dashed var(--line);background:#fafaf6;color:#333}.aside:before{content:"旁白";font-size:12px;font-weight:900;letter-spacing:.16em;margin-right:8px;color:#555}
.choiceList{display:grid;gap:10px;margin-top:14px}.choice{text-align:left;width:100%;line-height:1.7;padding:14px 15px}.choice b{color:#111;font-size:16px}.choice:hover{background:#f6f6f1}.impactText{display:block;margin-top:5px;color:#666;font-size:12px;font-weight:600}.result{padding:12px;border:1.5px solid var(--line);background:#fafaf6;color:#111;margin:10px 0}.pulse{margin:12px 0;padding:12px;border:1px solid var(--line);background:#fff}.consequence{display:grid;gap:6px;margin-top:8px}.impact{font-size:13px;color:#555}.statGrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}.stat{padding:12px;border:1px solid var(--line);background:#fff}.stat b{letter-spacing:.04em}.sep{height:1px;background:#111;margin:16px 0}.cleanList{padding-left:20px;color:#111}
.nav{position:fixed;left:0;right:0;bottom:0;display:none;justify-content:center;gap:0;padding:0 calc(8px + env(safe-area-inset-right)) env(safe-area-inset-bottom) calc(8px + env(safe-area-inset-left));background:#fff;border-top:2px solid var(--line);z-index:10}.nav button{min-width:72px;padding:12px 7px;font-size:13px;border-radius:0;border-width:0 1px 0 0;min-height:54px}.nav button:first-child{border-left:1px solid #111}.nav button.active{background:#111;color:#fff}.footerSpace{height:20px}.routeMeter{height:7px;background:#fff;border:1px solid var(--line);border-radius:0;overflow:hidden;margin-top:6px}.routeMeter i{display:block;height:100%;background:#111}
@media(max-width:620px){body{line-height:1.82}.app{padding:8px 8px 88px}.card{padding:16px}.hero{padding:30px 20px}.logo{font-size:27px}.chapterTitle{font-size:21px}.novel p{font-size:16px;line-height:2.02}.statGrid{grid-template-columns:1fr}.bar{width:88px}.nav button{min-width:0;flex:1;font-size:12.5px}.topbar{top:0}.status{align-items:flex-start}.status button{padding:10px 11px;min-height:42px}.sceneTitle{letter-spacing:.08em}}
</style>
</head>

function isBattle(ch){return motif(ch)==='冲突'||[7,15,22,29,34,44,52,58,66,77,86,107,117,124,132,142,154,164,174,184,194,205,214,224,244,254,264,274,284,290,291].includes(ch.no)}

function routeLine(){const k=dominant();const lines={courage:'你做决定时越来越少后退，连武魂的光都带着锋利的边。',wisdom:'你学会把情绪藏到最后一刻，先让局势替你说话。',bond:'你总会先看一眼身边的人，确认他们仍在你的影子里。',mercy:'你仍愿意给某些人一次回头的机会，哪怕这会让道路更难。',abyss:'黑暗越深，你越能听见那些被埋住的声音。',divinity:'掌心偶尔会发热，像有某种高处的东西想借你的手醒来。',freedom:'你开始厌恶所有替你写好的答案，哪怕它们看起来很正确。'};return lines[k]||lines.bond}
function epigraph(ch){const a=arc(ch);const table={origin:['少年第一次站到命运面前时，往往还不知道那是命运。','所有远行，都从一次不被理解的觉醒开始。'],academy:['怪物之所以是怪物，是因为他们连孤独都不肯按常理生长。','同伴不是天生可信，是一次次把背后交出去以后才可信。'],tournament:['赛场上没有永远的掌声，只有下一场更重的目光。','胜利会把少年推到光里，也会把弱点暴露给黑暗。'],road:['重逢从来不是回到过去，而是带着伤重新站到彼此身边。','三年的风会改变脸，却改变不了曾经并肩的方向。'],abyss:['深渊不是地名，是有人被世界丢下以后留下的回声。','当敌人也有伤口，刀就不再只负责劈下去。'],divine:['神性如果夺走人的名字，就不配被称作光。','被神注视不是荣耀，有时只是另一种牢笼。'],war:['战争会把所有选择都逼成答案，也会把所有答案逼出代价。','守住人，比赢下战场更难。'],finale:['命运写好结局，是为了等一个人把它撕掉。','怪物成神，不是飞到天上，而是把神拉回人间。']};return pick(table[a])}
function eventTexture(ch){const v=volume(ch),t=ch.title,m=motif(ch);let p=[];if(chapterHooks[ch.no])p.push(...chapterHooks[ch.no]);
 if(arc(ch)==='origin')p.push(`青石村的晨雾还没散，${v.figure}的声音穿过人群，落在你耳边时带着一种粗粝的真实。`, `你能听见自己袖口摩擦的声音，也能听见旁人低低议论你的${state.player.wuhun}。`);
 if(arc(ch)==='academy')p.push(`史莱克学院并不体面，木门歪斜，草地也坑坑洼洼，可这里每个人的眼神都像没有被磨平的刀。`, `${v.figure}没有给你们太多安慰，只把规则摊开：想留下，就证明自己配得上怪物这个名字。`);
 if(arc(ch)==='tournament')p.push(`看台上的喧嚣压下来，像一场由万人呼吸组成的暴雨。`, `对手的战袍在魂光里亮起，你终于意识到，天才从来不是史莱克独有的称呼。`);
 if(arc(ch)==='road')p.push(`远行的路让人沉默。每一座城都有新的传闻，每一封信都像从过去伸来的手。`, `你想起分开前的约定，才发现成长并不总是变强，有时只是学会独自撑过夜晚。`);
 if(arc(ch)==='abyss')p.push(`深渊的灯光冷得不像给活人准备，墙上的倒悬星纹像一只只闭不上的眼。`, `档案里那些被划掉的名字让人喘不过气，敌我两个字在这里忽然变得不够用。`);
 if(arc(ch)==='divine')p.push(`金色纹路在空气里缓缓浮现，像某种过于遥远的意志把手伸进人间。`, `你听见低语声说，成为容器也许能拯救很多人。可你更想问，被拯救的人还算不算自己。`);
 if(arc(ch)==='war')p.push(`战报一封接一封送来，地图上的红线不断延长，仿佛大陆本身正在裂开。`, `每个人都在奔赴自己的战场，没有谁还拥有只为自己害怕的资格。`);
 if(arc(ch)==='finale')p.push(`星盘世界没有真正的地面，你每踏出一步，都像踩在某个本该发生的未来上。`, `观星者的声音从四面八方传来，他不再像敌人，更像一段拒绝结束的悲剧。`);
 if(m==='冲突')p.push(`魂力先于言语爆开，空气被压得发紧，连呼吸都带着铁锈味。`); if(m==='真相')p.push(`真相没有立刻出现，它被藏在一句停顿、一个眼神和一份被撕去页脚的档案里。`); if(m==='羁绊')p.push(`伙伴的脚步声在你身后停住，那一瞬间，你知道自己不是一个人走到这里。`); return p}
function stageParagraphs(ch,scene){const v=volume(ch),p=state.player,a=allyFor(ch),tex=eventTexture(ch),m=motif(ch),r=dominant(),last=state.echoes[0]||'';
 if(scene===0)return [`“${epigraph(ch)}”`,`${v.image}。卷《${v.title}》的气息从${v.area}铺开，像一页被风翻起的书。`,`${ch.title}这几个字落下时，${p.wuhun}在你体内轻轻一震。你知道这一章不会只是经过，它会在你身上留下新的痕迹。`,last?`上一章的余音还没有散去：${last}`:`你把手按在胸口，听见魂力像暗流一样从经脉里流过。`];
 if(scene===1)return [`${tex[0]||v.mood}。`,`${tex[1]||v.pressure}。`,`${v.figure}的出现让局势有了重量。不是所有话都需要说出口，有些压力站在那里就足够了。`,routeLine()];
 if(scene===2)return [`事件真正压到面前时，你才发现${ch.title}并不是地图上的一个节点，而是一道必须跨过去的门。`,`${tex[2]||'四周的魂力悄然改变，像有人在暗处拨动了看不见的弦。'}`,isBattle(ch)?`这是会爆发冲突的一章。魂技、阵型、同伴的位置，都会在下一刻变得重要。`:`这不是单纯的战斗。你需要判断谁在说真话，谁把沉默当成了最后的盾。`,state.memory.wound>3?`你曾在深处见过太多伤口，所以此刻没有急着把任何人判成怪物。`:`你让自己慢下来，至少在做选择前，看清这件事真正伤到的是谁。`];
 if(scene===3)return [`${a}站到你身侧。${allyRoles[allies.indexOf(a)]}位的魂力波动并不喧哗，却稳定得让人安心。`,dialogueText(ch,a),`队伍里的气氛因此改变。有人握紧武器，有人低声确认阵型，也有人只是抬头看了看你。`,state.memory.promise>3?`你们之间已经有过太多次无需解释的默契，所以这一刻没有人催促你。`:`这支队伍还在学着相信你的判断，而你也在学着承担他们的信任。`];
 if(scene===4)return [`选择临近时，世界反而安静下来。`,`${v.pressure}。这句话不再只是背景，它正落在你肩上。`,`你可以选择更锋利，也可以选择更冷静；可以把伙伴拉近，也可以把目光投向更深处。`,`正史会继续向前，但从这一刻开始，故事会记住你的态度。`];
 if(scene===5)return [choiceAfter(state.lastChoice||r,ch),`这个决定没有立刻改变世界，却改变了你站在世界面前的姿势。`,echoForeshadow(state.lastChoice||r,ch),`你把这份答案收进心里，继续往下一页走。`];
 return [`本章的风声慢慢落下，${ch.title}留下的余温仍在指尖。`,closingLine(ch),`你的路线痕迹变得更清晰：${routeNames[dominant()]}正在成为别人理解你的方式。`,isBattle(ch)?`如果这是战斗，它带来的不只是胜负，还有新的伤、经验和配合。`:`如果这是沉默，它带来的不只是答案，还有下一次必须面对的疑问。`];}
function dialogueText(ch,a){const role=allyRoles[allies.indexOf(a)]||'伙伴';if(motif(ch)==='深渊')return `${a}压低声音：“如果他们只是敌人，我不会犹豫。可如果他们也是被推下去的人，我们至少要看清是谁在推。”`;if(motif(ch)==='神性')return `${a}看着你掌心的光：“神性听起来很高，可我只想确认，你还会不会用自己的声音回答我们。”`;if(isBattle(ch))return `${a}活动了一下手腕：“我会守住我的位置。你只管做决定，剩下的交给我们。”`;if(role==='辅助')return `${a}轻声说：“别把所有压力都揽过去。能救你的，不只有胜利，还有我们。”`;if(role==='精神')return `${a}望向远处：“他的眼神在躲避某个名字。你要是想赢，不妨先找到那个名字。”`;if(role==='敏攻')return `${a}笑了一下：“你开口之前，我不会动。你开口之后，我会是第一个到的人。”`;return `${a}说道：“我不知道哪条路一定对。但你选了，我们就会跟上。”`}
function choiceOptions(ch){if(ch.volume>=28)return [['freedom','打破安排','不做星盘里的容器。','终局更偏向自由核心与新的星空'],['divinity','承受神性','把神性留在人能理解的范围内。','终局更偏向归名之光'],['bond','相信七怪','让伙伴的声音盖过神的低语。','终局更偏向怪物成神'],['mercy','叫出陆观辰的名字','给观星者最后一次回头的可能。','终局更偏向陆观辰的星']];
 if(ch.volume>=23)return [['divinity','直面神性','看清神殿真正想要什么。','神性路线提高'],['wisdom','审问真相','先拆开神谕和档案。','谋略路线提高'],['mercy','寻找旧名','从陆观辰过去寻找破局点。','救赎路线提高'],['freedom','拒绝容器','不接受任何替你安排的答案。','自由路线提高']];
 if(ch.volume>=14)return [['abyss','深入深渊','亲眼确认实验场背后的真相。','深渊路线提高'],['mercy','救下实验体','把人从编号里拉回来。','救赎路线提高'],['wisdom','保留证据','让真相成为反击的刀。','谋略路线提高'],['bond','优先护队友','七怪不能再失去任何一个人。','羁绊提高']];
 if(ch.volume>=5)return [['courage','正面突破','以强攻压开局面。','大赛战斗更热血'],['wisdom','冷静布阵','先拆掉对方战术。','战术阅读更强'],['bond','保护队友','让队伍完整比一时胜负更重要。','组合技与队友信任提高'],['mercy','尊重对手','赢也不把对方踩进尘里。','对手后续评价更高']];
 return [['courage','迎上去','不让退缩成为习惯。','早期强攻倾向提高'],['wisdom','先观察','把嘲笑和压力都看成情报。','早期谋略倾向提高'],['bond','护住身边人','先确认伙伴不会受伤。','早期羁绊提高'],['mercy','留一线','不把别人的恶意变成自己的恶意。','救赎倾向萌芽']];}
function choiceAfter(k,ch){const base={courage:'你选择迎上去。魂力在经脉里冲开，像一把被磨了很久的刃。无论对手是谁，你都先让他明白：你不是会被吓退的人。',wisdom:'你没有急着动手，而是把每一个细节都放进脑海：脚步、呼吸、魂力波动、旁人的眼神。等你真正出手时，局势已经先输了一半给你的冷静。',bond:'你把目光投向伙伴。胜利当然重要，可如果胜利的代价是让同伴独自承受，你宁愿把脚步放慢，也要把他们带在身边。',mercy:'你没有把路堵死。对方也许站在敌人的位置，也许做过无法轻易原谅的事，可你仍愿意在最后一刻问一句：你还想不想回头？',abyss:'你选择走进更深的地方。黑暗不会因为被绕开就消失，只有亲眼看见它怎样吞人，才知道该怎样把人拉回来。',divinity:'你抬头看向那股近乎神明的力量，没有跪下，也没有逃开。你要弄清楚，所谓神性究竟是在拯救人，还是在替人夺走选择。',freedom:'你拒绝接受安排。无论命运、神殿还是星盘，都不能替你决定你该成为什么。你向前一步，把自己的名字重新握回手里。'};return base[k]||base.bond}
function echoForeshadow(k,ch){if(ch.volume<5)return '这一刻还很小，却会在很多年后成为你回忆里的第一道火。';if(ch.volume<14)return '队友们记住了你的做法，下一次配合会因此多一分默契。';if(ch.volume<23)return '深渊里的某个人也许还不知道，你的选择正在改变他的结局。';return '星盘深处有一道光轻轻偏移，仿佛某个结局因此换了方向。'}
function closingLine(ch){const m=motif(ch);if(m==='冲突')return '尘埃落下之后，最先传来的不是欢呼，而是队友确认彼此还站着的声音。';if(m==='真相')return '答案被写进札记，但你知道，真正危险的从来不是答案，而是有人不想让答案出现。';if(m==='羁绊')return '有人拍了拍你的肩，没有多说。可那一下比任何誓言都更踏实。';if(m==='深渊')return '黑暗没有退去，只是第一次在你面前显出了轮廓。';if(m==='神性')return '金色光芒慢慢暗下去，你却觉得它并没有离开，只是藏进了更深的地方。';return '下一章还在等你，而你已经不是走进这一章前的你。'}
function choiceHint(ch){if(ch.volume>=28)return '最终结局、陆观辰是否回头、神性归宿。';if(ch.volume>=23)return '神殿试炼、武魂殿态度、观星者真相。';if(ch.volume>=14)return '深渊三路、编号十三、逆星七子的去向。';if(ch.volume>=5)return '大赛战术、队友信任、黄金决战的文本氛围。';return '主角性格底色、七怪初期羁绊。'}
function pulse(ch){const v=volume(ch);return `<div class="pulse"><div class="readerLine"><b>本章线索</b><span class="mini">${esc(motif(ch))}</span><span class="mini">${isBattle(ch)?'冲突将起':'剧情推进'}</span></div><div class="consequence"><div class="impact">卷内主题：${esc(v.theme)}</div><div class="impact">选择会影响：${esc(choiceHint(ch))}</div></div></div>`}
function renderHome(){document.body.classList.remove('ingame');$('nav').style.display='none';$('root').className='';$('root').innerHTML=`<div class="home"><div class="hero"><h1 class="logo">斗罗大陆文字版 RPG</h1><div class="sub">像读小说一样推进主线，在关键处选择自己的道路。</div><div class="card"><div class="sceneTitle">开始之前</div><p class="small">输入角色名，或留空随机生成。故事会从卷一《武魂初醒》开始，沿三十卷正史推进。</p><input id="playerName" placeholder="角色名，可留空" /></div><div class="row"><button class="primary" onclick="startNew()">开始故事</button><button onclick="const s=load(); if(s&&s.started){state=s;setTab('story')}else alert('还没有故事进度')">继续阅读</button><button class="ghost" onclick="clearSave()">重新开始</button></div></div></div>`}
function header(){const p=state.player;return `<div class="topbar"><div class="status"><div><div class="name">${esc(p.name)}｜${esc(p.wuhun)}</div><div class="meta">${esc(p.quality)}｜${esc(p.background)}｜${esc(p.personality)}｜进度 ${progress()}%</div><div class="bars"><div class="bar"><i style="width:${100*p.hp/p.maxHp}%"></i></div><div class="bar sp"><i style="width:${100*p.sp/p.maxSp}%"></i></div></div></div><button class="ghost" onclick="save();alert('已保存')">存档</button></div></div>`}
function renderGame(){if(!state.started){renderHome();return}document.body.classList.add('ingame');$('nav').style.display='flex';document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));const nb=$('nav-'+tab);if(nb)nb.classList.add('active');$('root').className='app';let html=header();if(tab==='story')html+=storyView();if(tab==='role')html+=roleView();if(tab==='bond')html+=bondView();if(tab==='note')html+=noteView();$('root').innerHTML=html;window.scrollTo({top:0,behavior:'smooth'})}
function storyView(){const ch=current();if(!ch)return endingView();const paras=stageParagraphs(ch,state.scene);const choices=state.awaitChoice?choiceOptions(ch):[];const sceneLabel=SCENE_LABELS[state.scene]||'正文';return `<section class="card"><div class="chapterTitle">卷${ch.volume+1}《${esc(ch.volTitle)}》<small>第${ch.no}章：${esc(ch.title)}</small></div><div class="chapterMeta"><span class="mini">${esc(ch.area)}</span><span class="mini">${esc(sceneLabel)}</span><span class="mini">进度 ${progress()}%</span></div><div class="progressLine"><i style="width:${progress()}%"></i></div><div class="goal">当前目标：${isBattle(ch)?'走过本章冲突，在战斗、对话与选择里留下自己的答案。':'读完本章事件，在关键处决定主角的态度。'}</div>${state.lastResult?`<div class="result">${esc(state.lastResult)}</div>`:''}${pulse(ch)}<div class="sceneTitle">${esc(sceneLabel)}</div>${state.scene===0?`<div class="epigraph">${esc(paras[0])}</div><div class="novel">${paras.slice(1).map((p,i)=>`<p class="${i===0?'key':''}">${esc(p)}</p>`).join('')}</div>`:`<div class="novel">${paras.map((p,i)=>`<p class="${i===0?'key':(state.scene===5&&i===1?'whisper':'')}">${esc(p)}</p>`).join('')}</div>`}${state.scene===3?`<div class="dialogue">${esc(dialogueText(ch,allyFor(ch)))}</div>`:''}${choices.length?`<div class="choiceList">${choices.map(([k,t,d,impact])=>`<button class="choice" onclick="choose('${k}')"><b>${esc(t)}</b><br><span class="small">${esc(d)}</span><span class="impactText">影响：${esc(impact||routeDesc[k])}</span></button>`).join('')}</div>`:`<button class="primary" style="width:100%;margin-top:12px" onclick="continueStory()">继续</button>`}</section><div class="footerSpace"></div>`}
function continueStory(){const ch=current();state.lastResult='';state.reading++;if(!ch)return renderGame();if(state.scene<4){state.scene++}else if(state.scene===4){state.awaitChoice=true}else if(state.scene<6){state.scene++}else{finishChapter()}save();renderGame()}
function choose(k){const ch=current();state.lastChoice=k;state.route[k]=(state.route[k]||0)+1;state.awaitChoice=false;state.scene=5;if(k==='courage'||k==='freedom')state.memory.spark++;if(k==='abyss'||k==='divinity')state.memory.wound++;if(k==='bond'||k==='mercy')state.memory.promise++;const a=allyFor(ch);state.bond[a]=clamp((state.bond[a]||35)+(k==='bond'?4:1),0,100);const echo=`第${ch.no}章，你选择了${routeNames[k]}。${routeDesc[k]}。`;state.echoes.unshift(echo);state.echoes=state.echoes.slice(0,8);state.lastResult=`你选择了「${routeNames[k]}」。${routeDesc[k]}。`;state.history.unshift(`第${ch.no}章《${ch.title}》：${routeNames[k]}`);state.history=state.history.slice(0,32);save();renderGame()}
function finishChapter(){const ch=current();state.chapter++;state.scene=0;state.awaitChoice=false;state.lastChoice=null;state.lastResult=`第${ch.no}章《${ch.title}》结束。`;if(state.chapter%8===0){state.player.level++;state.player.maxHp+=8;state.player.maxSp+=4;state.player.hp=state.player.maxHp;state.player.sp=state.player.maxSp;state.lastResult+=` 你的魂力在旅途中更加稳定，等级提升。`}save();renderGame()}
function setTab(t){tab=t;renderGame()}
function roleView(){const p=state.player;return `<section class="card"><div class="chapterTitle">角色</div><div class="statGrid"><div class="stat"><b>姓名</b><br>${esc(p.name)}</div><div class="stat"><b>武魂</b><br>${esc(p.wuhun)}</div><div class="stat"><b>品质</b><br>${esc(p.quality)}</div><div class="stat"><b>出身</b><br>${esc(p.background)}</div><div class="stat"><b>性格</b><br>${esc(p.personality)}</div><div class="stat"><b>命格</b><br>${esc(p.fate)}</div></div></section><section class="card"><div class="sceneTitle">路线倾向</div>${Object.entries(state.route).map(([k,v])=>`<div style="margin:8px 0"><span class="tag">${routeNames[k]} ${v}</span><div class="routeMeter"><i style="width:${Math.min(100,v*12)}%"></i></div></div>`).join('')}<div class="sep"></div><div class="sceneTitle">魂技</div>${p.skills.map(s=>`<span class="tag">${esc(s)}</span>`).join('')}</section>`}
function bondView(){return `<section class="card"><div class="chapterTitle">七怪羁绊</div><p class="small">羁绊不是单独刷出来的数值，而是你在每章选择里慢慢留下的痕迹。</p><div class="statGrid">${allies.map((a,i)=>`<div class="stat"><b>${a}</b><br>${allyRoles[i]}｜信任 ${clamp(state.bond[a]||0,0,100)}</div>`).join('')}</div></section><section class="card"><div class="sceneTitle">最近的回应</div>${(state.echoes||[]).slice(0,5).map(e=>`<p class="small">${esc(e)}</p>`).join('')||'<p class="small">还没有留下回应。</p>'}</section>`}
function noteView(){const ch=current();const mem=state.memory||{spark:0,wound:0,promise:0};return `<section class="card"><div class="chapterTitle">故事札记</div><ul class="cleanList"><li>当前进度：${ch?`卷${ch.volume+1}《${ch.volTitle}》 第${ch.no}章《${ch.title}》`:'终章之后'}</li><li>当前区域：${ch?ch.area:'新的大陆'}</li><li>主导路线：${routeNames[dominant()]}</li><li>已阅读段落：${state.reading}</li></ul></section><section class="card"><div class="sceneTitle">主角留下的痕迹</div><span class="tag">锋芒 ${mem.spark||0}</span><span class="tag">伤痕 ${mem.wound||0}</span><span class="tag">约定 ${mem.promise||0}</span><div class="sep"></div><div class="sceneTitle">最近选择</div>${state.history.length?state.history.map(h=>`<span class="tag">${esc(h)}</span>`).join(''):'<p class="small">还没有选择记录。</p>'}<div class="sep"></div><div class="row"><button onclick="save();alert('已保存')">保存故事</button><button class="ghost" onclick="clearSave()">重新开始</button></div></section>`}
function endingView(){const r=dominant();const endings={bond:'怪物成神：你们没有把神性推上高台，而是把它带回人间。七怪仍是七怪，只是终于有能力守住更多人的明天。',freedom:'自由核心：你拒绝成为任何容器。星盘崩塌后，所有被写好的命运都重新变成选择。',mercy:'陆观辰的星：你叫出了观星者真正的名字。陆观辰没有被原谅，但他终于停下了继续伤害世界的手。',divinity:'归名之光：你承受神性，却不向神性低头。神不再无名，人也不再只是容器。',courage:'破局者：你用最直接的方式撕开终局，让所有安排都在你的武魂前碎裂。',wisdom:'新的星空：你没有选择唯一答案，而是为大陆保留了继续追问的权利。',abyss:'深渊回声：你从最深的地方带回那些被抹去的人，让深渊第一次有了回声。'};return `<section class="card"><div class="chapterTitle">终章</div><div class="novel"><p>${endings[r]||endings.bond}</p><p>新的大陆在晨光里展开。海风吹过时，你忽然想起青石村的第一天。那时你还不知道，自己会走这么远。</p><p>故事没有真正结束。只是从这一页开始，它不再只属于命运，也属于你。</p></div><button class="primary" style="width:100%" onclick="clearSave()">重新开始</button></section>`}
if(state.started)renderGame();else renderHome();
</script>
</body>
</html>
