<body class="large-touch">
  <main id="home" class="home">
    <section class="home-card fade-in">
      <div class="logo">斗罗大陆文字版 RPG</div>
      <div class="version">v3.0 · 体验重构版</div>
      <p class="home-desc">这版把旧版本的复杂入口全部收纳起来。首页只保留三个按钮，游戏中只围绕一个主流程推进：看剧情、做选择、打战斗、继续正史。</p>
      <div class="grid" style="margin:0 0 12px">
        <label class="small muted" for="heroNameInput">角色名，可不填</label>
        <input id="heroNameInput" maxlength="12" placeholder="不填则随机生成名字" style="width:100%;border-radius:16px;border:1px solid var(--line);background:rgba(255,255,255,.06);color:var(--text);padding:14px 15px;outline:none" />
      </div>
      <div class="home-actions">
        <button class="primary" onclick="smartStart()">继续游戏</button>
        <button class="secondary" onclick="newAwakening((document.getElementById('heroNameInput')||{}).value||'')">新的觉醒</button>
        <button class="ghost" onclick="openSettingsFromHome()">设置</button>
      </div>
      <p class="small muted" style="margin-top:16px">本作是同人文字游戏原型。v3.1 保持体验重构，并加入一个仅角色名触发的隐藏彩蛋。</p>
    </section>
  </main>

  <main id="app" class="page hidden">
    <header class="topbar">
      <div class="player-strip">
        <div class="avatar" id="avatar">魂</div>
        <div class="player-main">
          <div class="player-name" id="playerName">未觉醒</div>
          <div class="player-sub" id="playerSub">点击继续开始新的觉醒</div>
          <div class="mini-bars"><div class="mini-bar hp"><span id="topHp" style="width:100%"></span></div><div class="mini-bar sp"><span id="topSp" style="width:100%"></span></div></div>
        </div>
        <button class="ghost" style="padding:9px 12px;border-radius:14px" onclick="saveGame(true)">存档</button>
      </div>
    </header>

    <section id="tab-main" class="tab-page active"></section>
    <section id="tab-role" class="tab-page"></section>
    <section id="tab-team" class="tab-page"></section>
    <section id="tab-bag" class="tab-page"></section>
    <section id="tab-more" class="tab-page"></section>
  </main>

  <nav id="bottomNav" class="bottom-nav">
    <button class="navbtn active" data-tab="main" onclick="switchTab('main')"><span>📖</span>主线</button>
    <button class="navbtn" data-tab="role" onclick="switchTab('role')"><span>🧬</span>角色</button>
    <button class="navbtn" data-tab="team" onclick="switchTab('team')"><span>👥</span>队伍</button>
    <button class="navbtn" data-tab="bag" onclick="switchTab('bag')"><span>🎒</span>背包</button>
    <button class="navbtn" data-tab="more" onclick="switchTab('more')"><span>☰</span>更多</button>
  </nav>

    function startBattle(){const ch=state.chapter, v=volumeOf(ch), boss=bossChapters.has(ch); const base=70+ch*3; const name=enemyNames[ch]||`${v.title}对手`; const mult=difficultyMult(); state.battle={chapter:ch,name,boss,turn:1,guard:false,enemy:{hpMax:Math.round((base+(boss?180:60))*mult.hp),hp:Math.round((base+(boss?180:60))*mult.hp),spMax:80+v.no*12,sp:80+v.no*12,atk:Math.round((18+v.no*4)*mult.atk),def:12+v.no*2,phase:1},log:[`遭遇 ${name}。${boss?'这是Boss节点，注意血量阶段。':''}`],stats:{damage:0,taken:0,healed:0,items:0,skills:0,turns:1}}; state.mode='battle'; state.codex.enemies=[...new Set([...state.codex.enemies,name])]; saveGame(false)}

    function battleLog(t){state.battle.log.push(t); pushLog(t)}
    function winBattle(){const b=state.battle,m=difficultyMult(); const exp=Math.round((45+volumeOf(b.chapter).no*8+(b.boss?60:0))*m.reward); const coins=Math.round((20+volumeOf(b.chapter).no*4+(b.boss?30:0))*m.reward); gainExp(exp); state.growth.coins+=coins; state.inventory['小恢复药']=(state.inventory['小恢复药']||0)+(b.boss?1:0); if(b.boss) state.materials['魂骨碎片']=(state.materials['魂骨碎片']||0)+1; pushLog(`战斗胜利：经验+${exp}，魂币+${coins}${b.boss?'，魂骨碎片+1':''}。`); state.history.unshift({name:b.name,result:'胜利',chapter:b.chapter,turns:b.turn,damage:fmt(b.stats.damage),taken:fmt(b.stats.taken),time:new Date().toLocaleString()}); state.history=state.history.slice(0,10); state.mode='story'; state.battle=null; nextChapter(); toast('战斗胜利')}
    function loseBattle(){pushLog('战斗失败：系统保留正史推进，但你需要复盘恢复。'); state.character.hp=Math.round(state.character.hpMax*.65); state.character.sp=Math.round(state.character.spMax*.5); gainExp(25); state.mode='story'; state.battle=null; toast('已复盘恢复'); nextChapter()}

    function gainExp(n){state.growth.exp+=n; while(state.growth.exp>=state.growth.next){state.growth.exp-=state.growth.next; levelUp()}}
    function levelUp(){const g=state.growth,c=state.character; g.level++; g.statPoints+=2; g.skillPoints+=1; g.next=Math.round(g.next*1.18+30); c.hpMax+=14;c.spMax+=8;c.atk+=2;c.def+=1;c.spd+=1;c.mind+=1;c.hp=c.hpMax;c.sp=c.spMax; const ringAt=[10,20,30,40,50,60,70,80,90]; ringAt.forEach((lv,i)=>{const name=`第${i+1}魂环`; if(g.level>=lv&&!g.rings.includes(name))g.rings.push(name)}); pushLog(`等级提升到 ${g.level}，属性点+2，技能点+1。`)}
    function renderRole(){const c=state.character;if(!c){$('tab-role').innerHTML=emptyAwaken();return} const egg=c.easterEgg==='pepper_oil_body_wuhun'?'<div class="pill" style="color:var(--red);border-color:rgba(255,127,149,.35);background:rgba(255,127,149,.1);margin-top:8px">隐藏彩蛋：辣椒油专属先天残缺路线</div>':''; $('tab-role').innerHTML=`<section class="card"><div class="eyebrow">角色</div><div class="title">${c.name}</div><p class="muted">${c.bg}｜${c.family}｜${c.personality}｜${c.talent}｜命格：${c.fate}</p>${egg}<div class="stats"><div class="stat"><span>等级</span><b>${state.growth.level}</b></div><div class="stat"><span>经验</span><b>${state.growth.exp}/${state.growth.next}</b></div><div class="stat"><span>魂币</span><b>${state.growth.coins}</b></div></div></section><section class="card"><div class="section-title">属性</div><div class="stats"><div class="stat"><span>生命</span><b>${fmt(c.hpMax)}</b></div><div class="stat"><span>魂力</span><b>${fmt(c.spMax)}</b></div><div class="stat"><span>攻击</span><b>${fmt(c.atk)}</b></div><div class="stat"><span>防御</span><b>${fmt(c.def)}</b></div><div class="stat"><span>速度</span><b>${fmt(c.spd)}</b></div><div class="stat"><span>精神</span><b>${fmt(c.mind)}</b></div></div></section><section class="card"><div class="section-title">魂环与魂技</div><div class="list">${c.skills.map(s=>`<div class="item"><div class="item-title">${s.name}</div><div class="item-desc">${s.desc}</div></div>`).join('')}<div class="item"><div class="item-title">魂环</div><div class="item-desc">${state.growth.rings.length?state.growth.rings.join('、'):'尚未解锁魂环节点'}</div></div></div></section>`}
    function renderTeam(){const cards=state.team.map(t=>`<div class="item"><div class="row between"><div><div class="item-title">${t.name}｜${t.role}</div><div class="item-desc">武魂：${t.wuhun}｜专属组合技：${t.combo}</div></div><span class="pill">好感 ${t.favor}</span></div></div>`).join(''); $('tab-team').innerHTML=`<section class="card"><div class="eyebrow">队伍</div><div class="title">新一代史莱克七怪</div><p class="muted">队伍系统在 v3.0 中被收进单独页面，不再挤在主线界面里。</p><div class="progress"><span style="width:${pct(state.bond,100)}%"></span></div><p class="small muted">七怪羁绊：${state.bond}</p></section><section class="card"><div class="list">${cards}</div></section>`}
    function renderBag(){const inv=Object.entries(state.inventory).map(([k,v])=>`<div class="item"><div class="row between"><div class="item-title">${k}</div><span class="pill">×${v}</span></div><div class="item-desc">${itemDesc(k)}</div></div>`).join(''); const mats=Object.entries(state.materials).map(([k,v])=>`<span class="pill">${k} × ${v}</span>`).join(' '); $('tab-bag').innerHTML=`<section class="card"><div class="eyebrow">背包</div><div class="title">道具、装备、魂骨都收纳在这里</div><p class="muted">主线界面不再显示背包细节。战斗需要用药时再打开。</p></section><section class="card"><div class="section-title">战斗道具</div><div class="list">${inv}</div></section><section class="card"><div class="section-title">材料</div><div>${mats}</div></section>`}
    function renderMore(){const v=volumeOf(state.chapter); $('tab-more').innerHTML=`<section class="card"><div class="eyebrow">更多</div><div class="title">系统入口已收纳</div><p class="muted">任务、地图、图鉴、结局、设置、存档和高级工具都放在这里，不再干扰主流程。</p></section><section class="grid">
      <details class="accordion" open><summary>当前目标</summary><div class="accordion-body">卷${v.no}《${v.title}》｜${v.goal}<br>当前区域：${v.area}<br>正史进度：${pct(state.chapter,294)}%</div></details>
      <details class="accordion"><summary>地图探索</summary><div class="accordion-body">已解锁：${VOLUMES.filter(x=>state.chapter>=x.start).map(x=>x.area).join('、')}</div></details>
      <details class="accordion"><summary>图鉴与战斗历史</summary><div class="accordion-body">武魂图鉴：${state.codex.wuhun.join('、')||'无'}<br>敌人图鉴：${state.codex.enemies.slice(-8).join('、')||'无'}<br>最近战斗：${state.history.map(h=>`${h.name} ${h.result}`).join('；')||'无'}</div></details>
      <details class="accordion"><summary>存档管理</summary><div class="accordion-body"><button class="secondary" onclick="saveGame(true)">手动存档</button> <button class="ghost" onclick="exportSave()">导出存档</button> <button class="danger" onclick="clearSave()">清除存档</button><textarea id="saveBox" placeholder="导出的存档会显示在这里，也可以粘贴存档后导入" style="width:100%;min-height:90px;margin-top:10px;border-radius:14px;background:#0b1020;color:white;border:1px solid var(--line);padding:10px"></textarea><button class="ghost" onclick="importSave()" style="margin-top:8px">导入文本存档</button></div></details>
      <details class="accordion"><summary>设置</summary><div class="accordion-body"><label><input type="checkbox" ${state.settings.compact?'checked':''} onchange="state.settings.compact=this.checked;renderAll()"> 紧凑界面</label><br><label><input type="checkbox" ${state.settings.largeTouch?'checked':''} onchange="state.settings.largeTouch=this.checked;renderAll()"> 大触控模式</label><br><label>难度 <select onchange="state.difficulty=this.value;renderAll()"><option ${state.difficulty==='简单'?'selected':''}>简单</option><option ${state.difficulty==='标准'?'selected':''}>标准</option><option ${state.difficulty==='困难'?'selected':''}>困难</option><option ${state.difficulty==='噩梦'?'selected':''}>噩梦</option></select></label></div></details>
    </section>`}

    function openSheet(title,body){$('sheet').innerHTML=`<div class="sheet-head"><b>${title}</b><button class="sheet-close" onclick="closeSheet()">关闭</button></div><div class="list">${body}</div>`; $('sheet').classList.remove('hidden')}
    function closeSheet(){$('sheet').classList.add('hidden')}
    function openSettingsFromHome(){state.tab='more'; showApp(); renderAll(); switchTab('more')}
    function pulseMain(){if(!state.settings.animation)return; const el=$('tab-main'); el.classList.remove('pulse'); void el.offsetWidth; el.classList.add('pulse')}
    function pushLog(t){state.logs.unshift({t,time:Date.now()}); state.logs=state.logs.slice(0,40)}
    function toast(t){const el=$('toast'); el.textContent=t; el.classList.remove('hidden'); clearTimeout(window.__toast); window.__toast=setTimeout(()=>el.classList.add('hidden'),1500)}
    function finishGame(){state.mode='ending'; state.codex.endings=[...new Set([...state.codex.endings,'怪物成神'])]; renderAll(); saveGame(false)}
    function renderEnding(){$('tab-main').innerHTML=`<section class="card fade-in"><div class="eyebrow">最终结局</div><div class="title">怪物成神</div><div class="story-text"><p>星盘世界崩塌，七怪站在新大陆的晨光里。神性不再是容器，而成为被人选择的道路。</p></div><button class="primary" onclick="startNewPlus()">开启二周目</button></section>`}
    function startNewPlus(){state.ngp++; const keep={ngp:state.ngp,codex:state.codex}; state=defaultState(); state.ngp=keep.ngp; state.codex=keep.codex; state.started=true; state.mode='story'; state.character=generateCharacter(); state.growth.coins+=80*state.ngp; saveGame(false); renderAll(); toast(`二周目 ${state.ngp} 开始`)}
    function applySettings(){document.body.classList.toggle('compact',!!state.settings.compact);document.body.classList.toggle('large-touch',!!state.settings.largeTouch)}
    function saveGame(show=false){try{localStorage.setItem(SAVE_KEY,JSON.stringify(state)); if(show) toast('已保存')}catch(e){if(show) toast('保存失败')}}
    function loadGame(){try{const raw=localStorage.getItem(SAVE_KEY); if(raw){state=Object.assign(defaultState(),JSON.parse(raw)); repairState()}}catch(e){state=defaultState()}}
    function repairState(){const d=defaultState(); state.settings=Object.assign(d.settings,state.settings||{}); state.growth=Object.assign(d.growth,state.growth||{}); state.inventory=Object.assign(d.inventory,state.inventory||{}); state.materials=Object.assign(d.materials,state.materials||{}); state.team=state.team&&state.team.length?state.team:d.team; state.codex=Object.assign(d.codex,state.codex||{}); if(!state.character&&state.started)state.character=generateCharacter()}
    function exportSave(){const box=$('saveBox'); if(box) box.value=JSON.stringify(state,null,2); toast('存档已导出到文本框')}
    function importSave(){const box=$('saveBox'); if(!box||!box.value.trim()){toast('请先粘贴存档文本');return} try{state=JSON.parse(box.value); repairState(); saveGame(false); renderAll(); toast('导入成功')}catch(e){toast('导入失败，存档格式不对')}}
    function clearSave(){if(state.settings.confirmDanger&&!confirm('确认清除 v3.0 本地存档？'))return; localStorage.removeItem(SAVE_KEY); state=defaultState(); showHome(); toast('存档已清除')}

    loadGame(); if(state.started){showApp(); renderAll()} else {showHome()}
  </script>
</body>
</html>
